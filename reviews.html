<style>
  :root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--accent:#6c63ff;
    --green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;--text:#e2e8f0;--muted:#94a3b8;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;}
  header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
  header h1{font-size:18px;font-weight:700;color:#fff;}
  header h1 span{color:var(--accent);}
  .nav{display:flex;gap:8px;}
  .nav a{padding:5px 12px;border-radius:6px;border:1px solid var(--border);color:var(--muted);text-decoration:none;font-size:12px;transition:all .15s;}
  .nav a:hover{background:var(--accent);border-color:var(--accent);color:#fff;}
  .filters{background:var(--card);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:50;}
  .filters select,.filters input[type=text]{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-size:12px;outline:none;}
  .filters select:focus,.filters input:focus{border-color:var(--accent);}
  .filters input[type=text]{width:200px;}
  .count{color:var(--muted);font-size:12px;margin-left:auto;white-space:nowrap;}
  .clear-btn{padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;}
  .clear-btn:hover{border-color:var(--accent);color:var(--accent);}
  .main{max-width:1100px;margin:0 auto;padding:24px 28px;}
  .review-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px;position:relative;transition:border-color .15s;}
  .review-card:hover{border-color:rgba(108,99,255,.5);}
  .review-card.inkout{border-left:3px solid #a78bfa;}
  .review-meta{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
  .author{font-weight:700;color:#fff;font-size:13px;}
  .stars{color:var(--yellow);font-size:13px;font-weight:700;}
  .provider-link{font-size:12px;color:var(--accent);text-decoration:none;font-weight:600;}
  .provider-link:hover{text-decoration:underline;}
  .review-city{font-size:12px;color:var(--muted);}
  .review-date{font-size:12px;color:var(--muted);margin-left:auto;}
  .review-text{color:#e2e8f0;line-height:1.75;font-size:14px;margin:10px 0 12px;}
  .review-text.empty{color:var(--muted);font-style:italic;}
  .tags{display:flex;gap:6px;flex-wrap:wrap;}
  .badge{display:inline-block;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:600;}
  .badge-green{background:rgba(34,197,94,.15);color:var(--green);}
  .badge-yellow{background:rgba(245,158,11,.15);color:var(--yellow);}
  .badge-red{background:rgba(239,68,68,.15);color:var(--red);}
  .badge-blue{background:rgba(59,130,246,.15);color:var(--blue);}
  .badge-purple{background:rgba(108,99,255,.15);color:#a78bfa;}
  .badge-gray{background:#1e293b;color:#64748b;}
  .copy-btn{position:absolute;top:14px;right:14px;background:rgba(108,99,255,.15);border:1px solid rgba(108,99,255,.3);color:#a78bfa;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;opacity:0;transition:opacity .15s;}
  .review-card:hover .copy-btn{opacity:1;}
  .copy-btn:hover{background:rgba(108,99,255,.3);}
  .empty-state{text-align:center;padding:80px 20px;color:var(--muted);}
  .empty-state .big{font-size:48px;margin-bottom:12px;}
  @media(max-width:700px){.filters input[type=text]{width:100%;} .review-date{margin-left:0;}}
</style>
</head>

mpassion, making my tattoo removal journey an absolute breeze.\n\nFirst and foremost, Mandy’s expertise in tattoo removal is unparalleled. She took the time to thoroughly explain the process, answering all of my questions and alleviating any concerns I had. Her meticulous approach instilled confidence in me from the get-go.\n\nThroughout each session, Mandy’s attention to detail was evident. She ensured that I was comfortable and informed every step of the way, making the process surprisingly comfortable. Her gentle demeanor and reassuring presence truly made a difference, especially during those initial sessions when I was a bit apprehensive.\n\nMoreover, the results speak for themselves. Thanks to Mandy’s skillful technique and dedication, my tattoo has faded significantly with each session, exceeding my expectations. I’m beyond grateful for her expertise and the incredible results she has achieved.\n\nBeyond her technical proficiency, Mandy’s empathy and kindness truly set her apart. She genuinely cares about her clients and goes above and beyond to make them feel valued and supported throughout the entire process. Her warmth and positivity made what could have been a daunting experience incredibly positive and empowering.\n\nIn conclusion, I wholeheartedly recommend Mandy at Tat2Away for anyone considering tattoo removal. Not only is she a master of her craft, but she’s also a wonderful person who genuinely cares about her clients’ well-being. Thank you, Mandy, for making this journey so rewarding. You’ve gained a lifelong fan in me!\n\nIf anyone is skeptical of this process or this company, please reach out to me personally, and I would be happy to give more detail","result":"Positive","pain":2,"sessions":"unknown","use_case":"Complete","scarring":"No","isInkout":true,"file":"dashboard-v4-competitor-inkout-chicago-il.html"},{"provider":"inkout","city":"Chicago, IL","method":"TEPR","stars":1,"date":"a year ago","author":"Lilla Dent","text":"This company's technology looks amazing, and to its credit it may very well be a wonderful thing, HOWEVER, my personal experience with the clinic has convinced me that this is a very disorganized company, and furthermore one whose moral compass in terms of rational decision making is not skewed in a direction I admire.\n\nAfter some initial phone tag, I was able to book an appointment for a first treatment with this clinic some weeks ago. However, because of the fact that I chose to be completely honest with my medical history at the time and disclosed that I believe I have a mild hypermobility syndrome (something I certainly could have kept secret if I’d known the trouble it would cause), my appointment was abruptly cancelled by the upper management due to (I would say extremely paranoid) concerns about liability issues. Please note, nothing on the website currently mentions that folks with a hypermobility disorder will be summarily rejected from treatment!!\n\nNotably, I was not given any kind of say during this cancellation process. What irked me the most was I was not allowed to be part of any kind of conversation with management/the medical staff, despite the fact that this was a session that had been PROMISED to me and already BOOKED! And all this despite the fact that the tech who I had initially talked to said she was personally confident in and happy to give me the procedure despite the liability concerns, which she agreed were over the top given that I not only did not mind the idea of scarring, I actually thought it sounded cool were it to occur (I am a fan of the art form of scarification) and was willing to sign any kind of waiver to get the procedure done.\n\nFinally, it was extremely puzzling and upsetting to me that my appointment was cancelled essentially behind my back and the only notification I got of the cancellation was an extremely vague text message saying “I spoke with our medical staff and just had a few things I wanted to touch base with you on.” Well, I had no idea what news was waiting in store for me, I figured the “few things” were just bureaucratic details, but I indeed tried calling back for several days in a row after this message. However, I was met with the answering machine each time (it seems like their phones are generally understaffed), and there was never any more personalized follow up from the clinic’s side. In other words, *I* had to chase THEM to finally get the confirmation that my appointment had indeed been cancelled since they didn’t have the courage(?)/common sense to tell me up front in the text they sent??? So, if I had not diligently followed up in this manner, I very well could have showed up to my appointment only to be told ON THE SPOT that my session had been cancelled without my knowledge or approval – and keep in mind, I am not living in Chicago full time right now so I was building my entire travel schedule around this one appointment.\n\nFinally – and this is where it gets truly hilarious – weeks after the snafu with my cancelled appointment, I get a “follow up” text to an old message I had sent before scheduling the appointment saying “sorry this message got buried, when would you like to continue the conversation about booking?” I am no longer truly upset and can laugh about this now, but this company obviously needs to do some serious work in terms of client communications, PR, and staying on top of patient history.\n\nFurthermore, it is unfortunately apparently so obsessed about liability issues that it can’t make a rational exception to take on a sane adult client in good faith (although I guess that’s the age we live in, thanks #america). It also seems to be totally insensitive to the psychological damage and upset it might be causing a prospective (and then later rejected) client by the snowball effect of such vague, contradictory, and misguided messages! Sorry, Tatt2Away, I wanted to love you - but come on, this is basic client rapport skills, 101!","result":"Negative","pain":"unknown","sessions":0,"use_case":"unknown","scarring":"Positive","isInkout":true,"file":"dashboard-v4-competitor-inkout-chicago-il.html"},{"provider":"inkout","city":"Houston, TX","method":"TEPR","stars":4,"date":"a month ago","author":"Charles","text":"Great service fair orices","result":"Neutral","pain":"unknown","sessions":"unknown","use_case":"unknown","scarring":"No","isInkout":true,"file":"dashboard-v4-competitor-inkout-houston-tx.html"},{"provider":"inkout","city":"Houston, TX","method":"TEPR","stars":5,"date":"2 months ago","author":"Mireya Martinez","text":"Hi what’s the hours?","result":"unknown","pain":"unknown","sessions":"unknown","use_case":"unknown","scarring":"No","isInkout":true,"file":"dashboard-v4-competitor-inkout-houston-tx.html"},{"provider":"inkout","city":"Houston, TX","method":"TEPR","stars":5,"date":"7 months ago","author":"juan banda","text":"","result":"Positive","pain":"unknown","sessions":"unknown","use_case":"unknown","scarring":"No","isInkout":true,"file":"dashboard-v4-competitor-inkout-houston-tx.html"},{"provider":"inkout","city":"Houston, TX","method":"TEPR","stars":5,"date":"Edited 7 months ago","author":"B. W.","text":"I have been wanting to get my microblading removed for a while, and after much research, decided to schedule a consult here. The receptionist and technician made me feel so welcome and at home here. The technician was very kind and gentle, explaining every step of the process. I was fortunate to have only needed 1 session and a touch up later on. I couldn’t believe how much of the ink was visibly gone just after the first session!! The only regret I have is that I wish I had come here much sooner! I had a follow up appointment about 2 months later, and she touched up a few shadowy spots, complimentary. I am so grateful for my treatment here! Don’t hesitate to contact them, especially if you are living with embarrassing eyebrows like I was!! Thank you! 🫶❤️","result":"Positive","pain":"unknown","sessions":2,"use_case":  NOTHING. I seriously had no idea she had stuck a needle in me and when I asked about it, she said she was already done. I had to look in a mirror and see the injection site for myself to believe it. Perhaps her extensive experience being an OR nurse helped with that, as opposed to selling her soul to the devil.\n\nNah, it’s gotta be the devil thing.\n\nP.S. the results are amazing. I waited a few months before reviewing just in case there were any surprises.\n\nEdit: I went in again and my face got so messed up. I have TMJ and so Botox was recommended to weaken the masseter. At first, the TMJ pain subsided and I felt a noticeable difference. However, I soon *saw* a noticeable difference as well—and not a good one. The bottom half of my face got so thin and my jawline slackened. Should I have known Botox would have this effect? Yes, probably. However, I never even thought of it and was never told what the implications of receiving such treatment would entail, aesthetically speaking. I was embarrassed to go out into public. Also, I had happened to get a bad filler job around the same time, and for the first time, from them. I requested that filler be placed around and underneath my hollow eyes/dark circles, something I’ve had done many times before with amazing results. However, this time I came out looking like Maleficent and remained that way for months: high, rimmed orbital bones and pointy cheekbones, accompanied by a very slim face ending in a pointy chin.\n\nBecause I believe in good communication and in giving others a chance to try again, I went back. I told and showed them what was upsetting me and asked for help. It took several months to start building up my jaw muscles and then about two years to have it restored to normal. There was very little to be done except to wait out the Botox so the muscles could then rebuild themselves. They gave me a few hundred dollars off and generous samples of cosmetic and skin care products. I have waited years to edit this review so I could be further removed from this event and be as objective as possible in my feedback.","result":"Mixed","pain":1,"sessions":"unknown","use_case":"unknown","scarring":"No","isInkout":false,"file":"dashboard-v4-competitor-clarity-skin-draper-ut.html"},{"provider":"Clarity Skin","city":"Draper, UT","method":"PicoWay","stars":5,"date":"2 years ago","author":"Uxar","text":"Very nice place, warm welcome and very professional","result":"Neutral","pain":"unknown","sessions":"unknown","use_case":"unknown","scarring":"No","isInkout":false,"file":"dashboard-v4-competitor-clarity-skin-draper-ut.html"},{"provider":"Clarity Skin","city":"Draper, UT","method":"PicoWay","stars":1,"date":"Edited 3 years ago","author":"Holly Davis","text":"","result":"Negative","pain":"unknown","sessions":"unknown","use_case":"unknown","scarring":"No","isInkout":false,"file":"dashboard-v4-competitor-clarity-skin-draper-ut.html"},{"provider":"Clarity Skin","city":"Draper, UT","method":"PicoWay","stars":5,"date":"3 years ago","author":"Nattausha K Godwin","text":"Michelle is very experienced, knowledgeable & takes such precise care with her technique. I fully trust her when it comes to any filler. Clarity skin all around is such an amazing atmosphere, I love it here","result":"Neutral","pain":"unknown","sessions":"unknown","use_case":"unknown","scarring":"No","isInkout":false,"file":"dashboard-v4-competitor-clarity-skin-draper-ut.html"},{"provider":"Clarity Skin","city":"Draper, UT","method":"PicoWay","stars":5,"date":"3 years ago","author":"Megan DeLay","text":"","result":"Positive","pain":"unknown","sessions":"unknown","use_case":"unknown","scarring":"No","isInkout":false,"file":"dashboard-v4-competitor-clarity-skin-draper-ut.html"},{"provider":"Clarity Skin","city":"Draper, UT","method":"PicoWay","stars":5,"date":"4 years ago","author":"Rose Prestwich","text":"I love Clarity Skin. Very Professional. Excellent Customer Services. Environment Friendly.  Very Clean. Affordable.\nI do re ow even after the treatments are over they are still working for you for weeks to come, helping collagen production and new skin replacing old so you keep looking and feeling fresher and better. I cannot think of a more wonderful environment than Enfuse and to have someone as knowledgeable and specialized as Taylor helping me to navigate this journey. She is such a star, I can’t thank her enough and the team at Enfuse!!!","result":"Positive","pain":"unknown","sessions":"unknown","use_case":"Other","scarring":"No","isInkout":false,"file":"dashboard-v4-competitor-enfuse-medical-spa-chicago-il.html"},{"provider":"Enfuse Medical Spa","city":"Chicago, IL","method":"Other","stars":5,"date":"a week ago","author":"D","text":"I had such a great experience here that I felt like I had to share.\n\nFrom the moment I walked in, Kevin at the front desk made me feel so welcomed and comfortable. He was kind, patient, and just had such a positive, calming energy—which honestly sets the tone for the whole visit.\n\nPatti did my eyebrow tattoo laser removal, and I can’t say enough good things about her. I can finally say goodbye to my dark angry bird eyebrows!  She took her time to really listen to what I wanted to achieve with my face treatments and walked me through everything in a way that felt honest and thoughtful—not rushed or scripted. What stood out the most to me was that she didn’t try to push any products or upsell me. Instead, she genuinely explained what she would do if she were in my position trying to achieve the results I’m looking for. That kind of honesty is rare and so appreciated. As someone working hard to feel confident again and like what she sees in the mirror again, this felt like a breath of fresh air.\n\nYou can tell she truly cares about her clients and takes pride in her work. Her energy is warm, reassuring, and very genuine, which made me feel completely at ease throughout the entire process.\n\nI also want to say—nowadays we rely so much on social media, and it’s easy to feel discouraged if you don’t see tons of before-and-after photos or videos of specific treatments. But this experience reminded me that it’s absolutely worth coming in for a consultation, because Patti is truly worth it. Her knowledge, honesty, and approach can’t always be captured online.\n\nMy commute was over an hour. Could I have found somewhere closer? Maybe. But finding someone with her kind of energy and positive aura made it more than worth the drive. I left feeling more confident and genuinely happy with my results—and to me, that’s worth the drive and then some.\n\nI’m so happy I found this place, and I will 1,000% be coming back for my full face laser and Sculptra.\n\nIf you’re even thinking about booking, just do it. You’ll be in the best hands.","result":"Positive","pain":"unknown","sessions":"unknown","use_case":"Microblading","scarring":"No","isInkout":false,"file":"dashboard-v4-competitor-enfuse-medical-spa-chicago-il.html"},{"provider":"Enfuse Medical Spa","city":"Chicago, IL","method":"Other","stars":5,"date":"3 weeks ago","author":"Zia Varajon","text":"Enfuse Medical Spa is the only place I trust with my face! As a member of the LGBTQIA+ community, it can be difficult to find providers who are well-versed in affirming care, but each provider I have worked with has been incredibly knowledgeable and skilled. Enfuse has treated me with the utmost kindness, respect, and quality care for six years. Anyone and everyone would benefit from a visit here!","result":"Positive","pain":"unknown","sessions":"unknown","use_case":"unknown","scarring":"No","isInkout":false,"file":"dashboard-v4-competitor-enfuse-medical-spa-chicago-il.html"},{"provider":"Enfuse Medical Spa","city":"Chicago, IL","method":"Other","stars":5,"date":"3 weeks ago","author":"Melany E","text":"Thank you Matiysn for providing exceptional care! You do a great job at making someone feel comfortable and at ease. You have my trust and I look forward to seeing you every time!" function resultColor(r) {
  return r==='Positive'?'var(--green)':r==='Negative'?'var(--red)':r==='Mixed'?'var(--yellow)':r==='Neutral'?'var(--blue)':'#374151';
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
  });
}

function clearFilters() {
  ['f-city','f-provider','f-result','f-stars','f-usecase'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-sort').value = 'default';
  document.getElementById('f-search').value = '';
  render();
}

function render() {
  const city     = document.getElementById('f-city').value;
  const provider = document.getElementById('f-provider').value;
  const result   = document.getElementById('f-result').value;
  const stars    = document.getElementById('f-stars').value;
  const usecase  = document.getElementById('f-usecase').value;
  const sort     = document.getElementById('f-sort').value;
  const search   = document.getElementById('f-search').value.trim().toLowerCase();

  let data = REVIEWS.filter(r =>
    (!city     || r.city === city) &&
    (!provider || r.provider === provider) &&
    (!result   || r.result === result) &&
    (!stars    || Math.round(r.stars) === parseInt(stars)) &&
    (!usecase  || r.use_case === usecase) &&
    (!search   || r.text.toLowerCase().includes(search) || r.author.toLowerCase().includes(search) || r.provider.toLowerCase().includes(search))
  );

  if (sort === 'stars-desc') data.sort((a,b) => b.stars - a.stars);
  else if (sort === 'stars-asc') data.sort((a,b) => a.stars - b.stars);
  else if (sort === 'provider') data.sort((a,b) => a.provider.localeCompare(b.provider));

  document.getElementById('count').textContent = data.length.toLocaleString() + ' reviews';

  if (!data.length) {
    document.getElementById('list').innerHTML = '<div class="empty-state"><div class="big">🔍</div><div>No reviews match your filters</div></div>';
    return;
  }

  const rc = resultColor;
  document.getElementById('list').innerHTML = data.map(r => {
    const starsHtml = '★'.repeat(r.stars||0) + '☆'.repeat(5-(r.stars||0)) + ' ' + (r.stars||'?') + '★';
    const col = rc(r.result);
    return `<div class="review-card${r.isInkout?' inkout':''}">
      <button class="copy-btn" onclick="copyText(${JSON.stringify(r.text)}, this)">Copy</button>
      <div class="review-meta">
        <span class="author">${r.author}</span>
        <span class="stars">${starsHtml}</span>
        <a href="${r.file}" class="provider-link">${r.provider}</a>
        <span class="review-city">${r.city}</span>
        ${r.date ? '<span class="review-date">'+r.date+'</span>' : ''}
      </div>
      <div class="review-text${!r.text?' empty':''}">${r.text || 'No review text'}</div>
      <div class="tags">
        <span class="badge" style="background:rgba(0,0,0,.3);border:1px solid ${col};color:${col}">${r.result}</span>
        ${r.method ? '<span class="badge badge-gray">'+r.method+'</span>' : ''}
        ${r.pain !== 'unknown' ? '<span class="badge badge-yellow">Pain '+r.pain+'/5</span>' : ''}
        ${r.sessions !== 'unknown' && r.sessions ? '<span class="badge badge-blue">'+r.sessions+' sessions</span>' : ''}
        ${r.use_case && r.use_case !== 'unknown' ? '<span class="badge badge-purple">'+r.use_case+'</span>' : ''}
        ${r.scarring === 'Yes' ? '<span class="badge badge-red">Scarring</span>' : r.scarring === 'Positive' ? '<span class="badge badge-green">Healed well</span>' : ''}
      </div>
    </div>`;
  }).join('');
}

render();
</script>

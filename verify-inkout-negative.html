<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Review Verification — inkOUT Negative</title>
<style>
  :root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--accent:#6c63ff;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--text:#e2e8f0;--muted:#94a3b8;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;}
  header{padding:20px 32px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
  header h1{font-size:18px;font-weight:700;color:#fff;}
  header h1 span{color:var(--accent);}
  .progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;width:200px;}
  .progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s;}
  .progress-label{font-size:12px;color:var(--muted);margin-top:4px;text-align:right;}
  .container{max-width:960px;margin:0 auto;padding:24px 32px;}
  .toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
  .toolbar select,.toolbar button{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;cursor:pointer;}
  .toolbar button:hover{border-color:var(--accent);color:var(--accent);}
  .toolbar .export-btn{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
  .toolbar .export-btn:hover{opacity:.85;}
  .count{font-size:12px;color:var(--muted);margin-left:auto;}

  .review-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden;transition:border-color .2s;}
  .review-card.status-approved{border-color:var(--green);}
  .review-card.status-needs-edit{border-color:var(--yellow);}
  .review-card.status-rejected{border-color:var(--red);opacity:.6;}

  .card-header{padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .reviewer-name{font-weight:600;color:#fff;font-size:14px;}
  .meta{font-size:12px;color:var(--muted);}
  .stars{color:var(--yellow);font-size:13px;}
  .status-badge{margin-left:auto;padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:600;cursor:default;}
  .badge-pending{background:rgba(148,163,184,.15);color:var(--muted);}
  .badge-approved{background:rgba(34,197,94,.15);color:var(--green);}
  .badge-needs-edit{background:rgba(245,158,11,.15);color:var(--yellow);}
  .badge-rejected{background:rgba(239,68,68,.15);color:var(--red);}

  .card-body{padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  @media(max-width:640px){.card-body{grid-template-columns:1fr;}}

  .review-text-block label,.labels-block label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px;}
  .review-text{font-size:13px;line-height:1.65;color:var(--text);white-space:pre-wrap;background:rgba(0,0,0,.2);padding:12px;border-radius:8px;max-height:220px;overflow-y:auto;}

  .labels-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .label-row{display:flex;flex-direction:column;gap:4px;}
  .label-name{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
  .label-value{font-size:13px;font-weight:600;color:#fff;}
  .label-value.scarring-yes{color:var(--red);}
  .label-value.scarring-no{color:var(--green);}
  .label-value.result-negative{color:var(--red);}
  .label-value.result-positive{color:var(--green);}
  .label-value.result-neutral{color:var(--muted);}

  .edit-area{display:none;padding:14px 18px;border-top:1px solid var(--border);background:rgba(0,0,0,.15);}
  .edit-area.open{display:block;}
  .edit-area label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px;margin-top:10px;}
  .edit-area label:first-child{margin-top:0;}
  .edit-area select,.edit-area input,.edit-area textarea{width:100%;padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;}
  .edit-area textarea{min-height:80px;resize:vertical;}
  .edit-area .edit-actions{display:flex;gap:8px;margin-top:12px;}
  .edit-area .save-btn{padding:6px 16px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:600;cursor:pointer;}
  .edit-area .cancel-btn{padding:6px 16px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;}

  .card-actions{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;}
  .action-btn{padding:5px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s;}
  .action-btn.approve:hover,.action-btn.approve.active{background:rgba(34,197,94,.15);border-color:var(--green);color:var(--green);}
  .action-btn.needs-edit:hover,.action-btn.needs-edit.active{background:rgba(245,158,11,.15);border-color:var(--yellow);color:var(--yellow);}
  .action-btn.reject:hover,.action-btn.reject.active{background:rgba(239,68,68,.15);border-color:var(--red);color:var(--red);}
  .action-btn.edit-btn:hover,.action-btn.edit-btn.active{background:rgba(108,99,255,.15);border-color:var(--accent);color:var(--accent);}
  .note-input{flex:1;min-width:160px;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;}
  .note-input::placeholder{color:var(--muted);}

  .empty-state{text-align:center;padding:48px;color:var(--muted);}

  .export-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;}
  .export-modal.open{display:flex;}
  .export-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:600px;width:90%;max-height:80vh;display:flex;flex-direction:column;gap:12px;}
  .export-box h2{font-size:15px;color:#fff;}
  .export-box textarea{flex:1;min-height:300px;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;font-family:monospace;resize:none;}
  .export-box .close-btn{align-self:flex-end;padding:6px 16px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;}
</style>
</head>
<body>

<header>
  <div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">ReviewIntel · Verification Tool</div>
    <h1><span>inkOUT</span> — Negative Reviews</h1>
  </div>
  <div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0 / 12 reviewed</div>
  </div>
</header>

<div class="container">
  <div class="toolbar">
    <select id="filterStatus" onchange="renderCards()">
      <option value="all">All statuses</option>
      <option value="pending">Pending</option>
      <option value="approved">Approved</option>
      <option value="needs-edit">Needs edit</option>
      <option value="rejected">Rejected</option>
    </select>
    <select id="filterCity" onchange="renderCards()">
      <option value="all">All locations</option>
      <option value="Austin">Austin, TX</option>
      <option value="Draper">Draper, UT</option>
      <option value="Houston">Houston, TX</option>
      <option value="Tampa">Tampa, FL</option>
    </select>
    <button onclick="approveAll()">Approve all visible</button>
    <button class="export-btn" onclick="openExport()">Export verified JSON</button>
    <span class="count" id="countLabel"></span>
  </div>

  <div id="cardList"></div>
</div>

<div class="export-modal" id="exportModal">
  <div class="export-box">
    <h2>Verified Reviews — JSON Export</h2>
    <textarea id="exportText" readonly></textarea>
    <div style="display:flex;gap:8px;">
      <button class="save-btn" style="padding:6px 16px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:12px;cursor:pointer;" onclick="copyExport()">Copy to clipboard</button>
      <button class="close-btn" onclick="closeExport()">Close</button>
    </div>
  </div>
</div>

<script>
const RAW = [
  {"provider_name":"inkOUT","location_city":"Austin","location_state":"TX","method_used":"TEPR","review_text":"I wanted to love this process, but unfortunately ended up with permanent scarring and a tattoo that looks far worse than it did prior to coming here. I paid $1800 for 4 treatments. I used 2 and neither worked, only made matters worse. They only will refund $600 of the unused $900, no refunds for the 2 treatments that didn't work/caused serious scarring. Now I'm paying to see a dermatologist and next week a consultation for laser treatment for the scarring.\nI really hate to leave negative reviews for places but please do more research than I did prior to considering this route. Unfortunately, I decided to read all of the Reddit reviews AFTER the fact and per reviews it's not uncommon for this to happen.","star_rating":1,"review_date":"Edited 11 months ago","reviewer_name":"Carly Decker","verified_source":"Google","_place_title":"Rejuvatek Aesthetics providing inkOUT®","pain_level":"unknown","scarring_mentioned":"Yes","sessions_completed":2,"skin_type":"unknown","use_case":"unknown","result_rating":"Negative"},
  {"provider_name":"inkOUT","location_city":"Austin","location_state":"TX","method_used":"TEPR","review_text":"I do not recommend this company for tattoo removal. My first experience was on March 22nd and the technician, Maggie, was absolutely amazing. She took the time to explain the process to me and reassure me of any fears I had going in. She was very gentle, and pleasant and showed she cared not only about my tattoo horrible story, but the integrity of my skin. I had 2 services with her and each time was better than the last!\nHowever, I've since tried to rebook Maggie and have sadly been informed that she is no longer employed there. I did receive treatment from one other technician since Maggie's departure and I must say, my skin is swollen, painful and I fear I may walk away from this session with scars which was never a concern before. The woman that worked on me was not very nice, quick with the process and seemed like she could care less about the integrity of my skin and if I were to scar.\nAs a licensed esthetician in the service industry, I know a good worker when I see one and Maggie was that, the other lady, who I didn't care to remember her name of, was not. I unfortunately will not be returning as I do worry about my skin health and I do not feel valued as a customer.","star_rating":1,"review_date":"a year ago","reviewer_name":"Sophia Cerrone","verified_source":"Google","_place_title":"Rejuvatek Aesthetics providing inkOUT®","pain_level":4,"scarring_mentioned":"Yes","sessions_completed":3,"skin_type":"unknown","use_case":"unknown","result_rating":"Negative"},
  {"provider_name":"inkOUT","location_city":"Austin","location_state":"TX","method_used":"TEPR","review_text":"Do not get this treatment. I went in for my first treatment and was in the most excruciating pain I had ever been in, no, it does not \u201cFeel like a tattoo gun\u201d. The healing was horrible. My arm was so swollen. I could not see my elbow for about three days. I have never had scar prone skin, and I started to form a few keloids and got concerned, I ended up reaching out to a dermatologist, who highly advised it gets going to another treatment Because the body is not meant to endure this multiple times. This company falsely advertises results, and I have tried for going on two weeks now to reach out to the manager and have gotten one email back asking to set up a time to meet, which she did not even respond back to meet with me the day i had suggested. I am very upset and feel completely bamboozled.","star_rating":1,"review_date":"2 years ago","reviewer_name":"brionna savage","verified_source":"Google","_place_title":"Rejuvatek Aesthetics providing inkOUT®","pain_level":5,"scarring_mentioned":"Yes","sessions_completed":1,"skin_type":"unknown","use_case":"unknown","result_rating":"Negative"},
  {"provider_name":"inkOUT","location_city":"Draper","location_state":"UT","method_used":"TEPR","review_text":"STAY AWAY!! I did two sessions in 2022 and I still have the SCARS! These people mutilated my body and should not be in business. I followed all of the aftercare instructions perfectly and now I will have to pay hundreds of dollars to try n fix what they did to me. I have had random people come up to me and tell me they also scarred from this treatment! Strangers come up to me everywhere I go and ask about my arm it is embarrassing!! Do not trust them! This photo is what it looks like now, I do not want anyone else to go through this.","star_rating":1,"review_date":"2 months ago","reviewer_name":"Emma Kondris","verified_source":"Google","_place_title":"Rejuvatek Aesthetics providing inkOUT®","pain_level":"unknown","scarring_mentioned":"Yes","sessions_completed":2,"skin_type":"unknown","use_case":"unknown","result_rating":"Negative"},
  {"provider_name":"inkOUT","location_city":"Draper","location_state":"UT","method_used":"TEPR","review_text":"Absolutely horrible experience. A close family member went here for tattoo removal and was left with severe scarring despite following every single aftercare instruction exactly as directed.\n\nThis procedure was significantly more painful than professional laser removal, yet delivered far worse results. Instead of fading the tattoo, it caused lasting damage that now requires laser treatment to fix the harm done here.\n\nIf you're considering tattoo removal, do yourself a favor and look elsewhere. Read the other reviews carefully and consult a licensed laser removal provider instead. This place caused permanent consequences that could have been avoided.","star_rating":1,"review_date":"Edited 2 months ago","reviewer_name":"Maddie Bodily","verified_source":"Google","_place_title":"Rejuvatek Aesthetics providing inkOUT®","pain_level":4,"scarring_mentioned":"Yes","sessions_completed":"unknown","skin_type":"unknown","use_case":"Complete","result_rating":"Negative"},
  {"provider_name":"inkOUT","location_city":"Draper","location_state":"UT","method_used":"TEPR","review_text":"***responding to their response\u2026\nIt is simply not true that they have received no response from me. I text them on March 11th and after not hearing back, I sent a bubble \u201c?\u201d  To my text about scarring. After several days I received a text that I will have to come in and asked what time works best, which was just a few days ago. So the fact that they are saying they have made several attempts and haven\u2019t received a response is just simply not true.\nAlso them saying the pictures I attached are the ones showing irritations is also false. I didn\u2019t even post those pictures original, I now have irritated photos posted. The pictures I posted are 2 months past my last appt. I have taken extremely good care of the wound (cause that is what it is) and the pictures are after all that extra care. That is the pictures of it healed! Which is why I text them about the scarring. You shouldn\u2019t have to use tegaderm to not have scarring. This \u201ctattoo removal\u201d will scar you!\n\nDO NOT get tattoo removal here! You will be left with a permanent scar where your tattoo was.\n\nIt\u2019s appalling that this company is still operating. Their practices are not just unethical, but downright harmful. They are knowingly scarring their clients and should be shut down immediately! Avoid this company at all costs!\n\nAnd for those that are thinking that I am just an angry customer and that there are enough good reviews to give it a try\u2026I would encourage you to notice that none of the \u201cgood\u201d reviews have before and after pictures. How would anyone give a good review for being permanently scarred??\n\nThese pics show the different stages. I have had 3 treatments and will never go back. This is the scar I am left with. \ud83d\ude16\ud83d\ude14\ud83d\ude21","star_rating":1,"review_date":"Edited 11 months ago","reviewer_name":"Britney De Jong","verified_source":"Google","_place_title":"Rejuvatek Aesthetics providing inkOUT®","pain_level":"unknown","scarring_mentioned":"Yes","sessions_completed":3,"skin_type":"unknown","use_case":"unknown","result_rating":"Negative"},
  {"provider_name":"inkOUT","location_city":"Draper","location_state":"UT","method_used":"TEPR","review_text":"Did two treatments - with little changes after each session. Was charged $1000 for two sessions. It is $500 per session. It would probably take 10+ sessions to remove at this rate. Laser is cheaper and much faster than the 3-hour painful appointments.\n\nI was also ghosted with no response during what was supposed to be my follow-up for 1 whole month before I was told my person had left the company. Just not a good experience, unfortunately all around. 10+ hours wasted. Lots of pain and 1k out of money with the entire tattoo still there... :(","star_rating":1,"review_date":"a year ago","reviewer_name":"B","verified_source":"Google","_place_title":"Rejuvatek Aesthetics providing inkOUT®","pain_level":4,"scarring_mentioned":"No","sessions_completed":2,"skin_type":"unknown","use_case":"Complete","result_rating":"Negative"},
  {"provider_name":"inkOUT","location_city":"Draper","location_state":"UT","method_used":"TEPR","review_text":"Absolute worst place. My first appointment, Jazz forgot to give me her number after telling me to send her pictures of how my tattoo removal was healing in the next few days. I was calling the office with questions and trying to get her number, and no one answered. It wasn't until she contacted me over a month later, saying she needed to do our next visit over the phone because she wasn't going to be in the office, that i finally got her number. Setting up appointments afterwards was horrible, and took forever to actually get a response no matter how many times I called and texted. The whole process was taking so much longer than necessary. Eventually she got some help, but by then I had decided I was done with her forgetfulness and unprofessionalism. It's not worth it. Get laser or a tattoo cover up honestly. By far the worst experience. No questions were answered, always rushed, and it was a WASTE.","star_rating":1,"review_date":"a year ago","reviewer_name":"jess","verified_source":"Google","_place_title":"Rejuvatek Aesthetics providing inkOUT®","pain_level":"unknown","scarring_mentioned":"No","sessions_completed":"unknown","skin_type":"unknown","use_case":"Complete","result_rating":"Negative"},
  {"provider_name":"inkOUT","location_city":"Draper","location_state":"UT","method_used":"TEPR","review_text":"","star_rating":1,"review_date":"a year ago","reviewer_name":"khaled","verified_source":"Google","_place_title":"Rejuvatek Aesthetics providing inkOUT®","pain_level":"unknown","scarring_mentioned":"No","sessions_completed":"unknown","skin_type":"unknown","use_case":"unknown","result_rating":"Negative"},
  {"provider_name":"inkOUT","location_city":"Draper","location_state":"UT","method_used":"TEPR","review_text":"Not for melanin rich or scar prone skin. Left huge raised scars covering my arm.","star_rating":1,"review_date":"3 years ago","reviewer_name":"Shayla McGuire","verified_source":"Google","_place_title":"Rejuvatek Aesthetics providing inkOUT®","pain_level":"unknown","scarring_mentioned":"Yes","sessions_completed":"unknown","skin_type":"Dark","use_case":"unknown","result_rating":"Negative"},
  {"provider_name":"inkOUT","location_city":"Houston","location_state":"TX","method_used":"TEPR","review_text":"The tested zap was great, first session they put on lowest setting. Didn't affect tattoo at all, not even faded. Didn't peel or do anything! Go to removery this place is a scam","star_rating":1,"review_date":"2 years ago","reviewer_name":"Kayla King","verified_source":"Google","_place_title":"Houston Tattoo Removal Clinic","pain_level":"unknown","scarring_mentioned":"No","sessions_completed":1,"skin_type":"unknown","use_case":"Complete","result_rating":"Negative"},
  {"provider_name":"inkOUT","location_city":"Tampa","location_state":"FL","method_used":"TEPR","review_text":"Very poor customer service! Hung up on me as I was inquiring about their services","star_rating":1,"review_date":"3 years ago","reviewer_name":"CoKo Lashera","verified_source":"Google","_place_title":"Inkstheticare Clinic Laser Tattoo Removal & Reconstructive Medical Tattooing Tampa","pain_level":"unknown","scarring_mentioned":"No","sessions_completed":"unknown","skin_type":"unknown","use_case":"unknown","result_rating":"unknown"}
];

// State — load from localStorage or init
const STORAGE_KEY = 'rtr_verify_inkout_neg_v1';
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
if (!state) {
  state = RAW.map((r, i) => ({
    id: i,
    ...r,
    _status: 'pending',   // pending | approved | needs-edit | rejected
    _note: '',
    _edited: false
  }));
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  updateProgress();
}

function updateProgress() {
  const done = state.filter(r => r._status !== 'pending').length;
  const pct = Math.round((done / state.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} / ${state.length} reviewed`;
}

function stars(n) { return '★'.repeat(n) + '☆'.repeat(5 - n); }

function scarringClass(v) {
  if (v === 'Yes') return 'scarring-yes';
  if (v === 'No') return 'scarring-no';
  return '';
}

function resultClass(v) {
  if (v === 'Negative') return 'result-negative';
  if (v === 'Positive') return 'result-positive';
  if (v === 'Neutral') return 'result-neutral';
  return '';
}

function badgeHtml(status) {
  const map = {
    pending: ['badge-pending','Pending'],
    approved: ['badge-approved','✓ Approved'],
    'needs-edit': ['badge-needs-edit','⚠ Needs Edit'],
    rejected: ['badge-rejected','✗ Rejected']
  };
  const [cls, label] = map[status] || map.pending;
  return `<span class="status-badge ${cls}">${label}</span>`;
}

function renderCards() {
  const filterStatus = document.getElementById('filterStatus').value;
  const filterCity = document.getElementById('filterCity').value;
  const list = document.getElementById('cardList');

  const visible = state.filter(r => {
    if (filterStatus !== 'all' && r._status !== filterStatus) return false;
    if (filterCity !== 'all' && r.location_city !== filterCity) return false;
    return true;
  });

  document.getElementById('countLabel').textContent = `Showing ${visible.length} of ${state.length}`;

  if (!visible.length) {
    list.innerHTML = '<div class="empty-state">No reviews match the current filter.</div>';
    return;
  }

  list.innerHTML = visible.map(r => `
    <div class="review-card status-${r._status}" id="card-${r.id}">
      <div class="card-header">
        <div>
          <div class="reviewer-name">${r.reviewer_name || '(no name)'}</div>
          <div class="meta">${r.location_city}, ${r.location_state} · ${r._place_title} · ${r.review_date}</div>
        </div>
        <div class="stars">${stars(r.star_rating)}</div>
        ${badgeHtml(r._status)}
      </div>

      <div class="card-body">
        <div class="review-text-block">
          <label>Original review text</label>
          <div class="review-text">${r.review_text ? escHtml(r.review_text) : '<em style="color:var(--muted)">(no text — star rating only)</em>'}</div>
        </div>
        <div class="labels-block">
          <label>AI-generated labels ${r._edited ? '<span style="color:var(--yellow);font-size:10px;">· edited</span>' : ''}</label>
          <div class="labels-grid">
            <div class="label-row"><div class="label-name">Result rating</div><div class="label-value ${resultClass(r.result_rating)}">${r.result_rating}</div></div>
            <div class="label-row"><div class="label-name">Scarring</div><div class="label-value ${scarringClass(r.scarring_mentioned)}">${r.scarring_mentioned}</div></div>
            <div class="label-row"><div class="label-name">Pain level</div><div class="label-value">${r.pain_level === 'unknown' ? '—' : r.pain_level + '/5'}</div></div>
            <div class="label-row"><div class="label-name">Sessions</div><div class="label-value">${r.sessions_completed === 'unknown' ? '—' : r.sessions_completed}</div></div>
            <div class="label-row"><div class="label-name">Use case</div><div class="label-value">${r.use_case}</div></div>
            <div class="label-row"><div class="label-name">Skin type</div><div class="label-value">${r.skin_type}</div></div>
          </div>
          ${r._note ? `<div style="margin-top:10px;font-size:12px;color:var(--yellow);">Note: ${escHtml(r._note)}</div>` : ''}
        </div>
      </div>

      <div class="edit-area" id="edit-${r.id}">
        <label>Result rating</label>
        <select id="edit-result-${r.id}">
          <option ${r.result_rating==='Positive'?'selected':''}>Positive</option>
          <option ${r.result_rating==='Neutral'?'selected':''}>Neutral</option>
          <option ${r.result_rating==='Mixed'?'selected':''}>Mixed</option>
          <option ${r.result_rating==='Negative'?'selected':''}>Negative</option>
          <option ${r.result_rating==='unknown'?'selected':''}>unknown</option>
        </select>
        <label>Scarring mentioned</label>
        <select id="edit-scarring-${r.id}">
          <option ${r.scarring_mentioned==='Yes'?'selected':''}>Yes</option>
          <option ${r.scarring_mentioned==='No'?'selected':''}>No</option>
          <option ${r.scarring_mentioned==='Positive'?'selected':''}>Positive</option>
        </select>
        <label>Pain level (1–5 or unknown)</label>
        <input id="edit-pain-${r.id}" value="${r.pain_level}">
        <label>Sessions completed (number or unknown)</label>
        <input id="edit-sessions-${r.id}" value="${r.sessions_completed}">
        <label>Use case</label>
        <select id="edit-usecase-${r.id}">
          ${['Complete','Cover-up','Microblading','Color','Other','unknown'].map(v=>`<option ${r.use_case===v?'selected':''}>${v}</option>`).join('')}
        </select>
        <label>Skin type</label>
        <select id="edit-skin-${r.id}">
          ${['Light','Medium','Dark','unknown'].map(v=>`<option ${r.skin_type===v?'selected':''}>${v}</option>`).join('')}
        </select>
        <label>Your note (optional)</label>
        <textarea id="edit-note-${r.id}">${escHtml(r._note)}</textarea>
        <div class="edit-actions">
          <button class="save-btn" onclick="saveEdit(${r.id})">Save changes</button>
          <button class="cancel-btn" onclick="closeEdit(${r.id})">Cancel</button>
        </div>
      </div>

      <div class="card-actions">
        <button class="action-btn approve ${r._status==='approved'?'active':''}" onclick="setStatus(${r.id},'approved')">✓ Approve</button>
        <button class="action-btn needs-edit ${r._status==='needs-edit'?'active':''}" onclick="setStatus(${r.id},'needs-edit')">⚠ Needs edit</button>
        <button class="action-btn reject ${r._status==='rejected'?'active':''}" onclick="setStatus(${r.id},'rejected')">✗ Reject</button>
        <button class="action-btn edit-btn" onclick="toggleEdit(${r.id})">✎ Edit labels</button>
        <input class="note-input" placeholder="Add a note…" value="${escHtml(r._note)}" onchange="setNote(${r.id}, this.value)">
      </div>
    </div>
  `).join('');

  updateProgress();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setStatus(id, status) {
  state[id]._status = status;
  save();
  renderCards();
}

function setNote(id, note) {
  state[id]._note = note;
  save();
}

function toggleEdit(id) {
  const el = document.getElementById('edit-' + id);
  el.classList.toggle('open');
  const btn = el.closest('.review-card').querySelector('.edit-btn');
  btn.classList.toggle('active', el.classList.contains('open'));
}

function closeEdit(id) {
  document.getElementById('edit-' + id).classList.remove('open');
}

function saveEdit(id) {
  const r = state[id];
  r.result_rating = document.getElementById('edit-result-' + id).value;
  r.scarring_mentioned = document.getElementById('edit-scarring-' + id).value;
  const pain = document.getElementById('edit-pain-' + id).value.trim();
  r.pain_level = isNaN(pain) ? pain : Number(pain);
  const sess = document.getElementById('edit-sessions-' + id).value.trim();
  r.sessions_completed = isNaN(sess) ? sess : Number(sess);
  r.use_case = document.getElementById('edit-usecase-' + id).value;
  r.skin_type = document.getElementById('edit-skin-' + id).value;
  r._note = document.getElementById('edit-note-' + id).value;
  r._edited = true;
  save();
  renderCards();
}

function approveAll() {
  const filterStatus = document.getElementById('filterStatus').value;
  const filterCity = document.getElementById('filterCity').value;
  state.forEach(r => {
    if (filterStatus !== 'all' && r._status !== filterStatus) return;
    if (filterCity !== 'all' && r.location_city !== filterCity) return;
    r._status = 'approved';
  });
  save();
  renderCards();
}

function openExport() {
  const approved = state.filter(r => r._status === 'approved').map(r => {
    const {_status, _note, _edited, id, ...clean} = r;
    if (_note) clean._verification_note = _note;
    if (_edited) clean._labels_edited = true;
    return clean;
  });
  document.getElementById('exportText').value = JSON.stringify(approved, null, 2);
  document.getElementById('exportModal').classList.add('open');
}

function closeExport() {
  document.getElementById('exportModal').classList.remove('open');
}

function copyExport() {
  const ta = document.getElementById('exportText');
  ta.select();
  document.execCommand('copy');
  alert('Copied to clipboard!');
}

renderCards();
</script>
</body>
</html>
